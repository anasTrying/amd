<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>وضّح — Wadhah Mockup</title>
<style>
  :root {
    /* لوحة مستوحاة من هوية هاكاثون امد: نيلي عميق + طيني دافئ + بنفسجي + كريمي */
    --bg: #16152F;
    --card: #201F42;
    --card-elev: #2B2A54;
    --accent: #C66E4E;
    --copper: #D98A67;
    --user-bubble: #8E8AD8;
    --assist-bubble: #F3EBDD;
    --lavender: #8E8AD8;
    --text: #FFFFFF;
    --text-2: rgba(243,235,221,.55);
    --radius: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  html, body { height: 100%; }
  body {
    background:
      radial-gradient(620px 420px at 82% 12%, rgba(198,110,78,.14), transparent 65%),
      radial-gradient(560px 420px at 12% 88%, rgba(142,138,216,.10), transparent 65%),
      #0A0918;
    font-family: -apple-system, "SF Pro Text", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  body.embedded { background: transparent; }
  #scaler { transform-origin: center center; }
  #lockscreen {
    position: absolute; inset: 0; z-index: 60; cursor: pointer;
    border-radius: inherit;
    background:
      linear-gradient(115deg, rgba(255,255,255,0.045) 0%, rgba(255,255,255,0.012) 28%, transparent 45%),
      linear-gradient(180deg, #0B0A20, #060512 60%, #080719);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
    opacity: 1; transition: opacity 0.9s ease;
  }
  #lockscreen.off { opacity: 0; pointer-events: none; }
  #lockscreen .lock-mark {
    width: 44px; color: rgba(255, 255, 255, 0.22);
    animation: lockBreath 4.5s ease-in-out infinite;
  }
  #lockscreen .lock-hint {
    font-size: 12.5px; color: rgba(255, 255, 255, 0.30);
    letter-spacing: 0.05em;
    animation: lockBreath 4.5s ease-in-out infinite;
  }
  @keyframes lockBreath { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }
  @media (prefers-reduced-motion: reduce) { #lockscreen .lock-mark, #lockscreen .lock-hint { animation: none; } }

  /* ---------- Phone frame ---------- */
  .phone {
    width: 393px; height: 852px;
    background: var(--bg);
    border: 13px solid #0c0c0e;
    border-radius: 58px;
    box-shadow: 0 34px 80px rgba(8,6,26,.6);
    position: relative;
    overflow: hidden;
  }
  .island {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    width: 118px; height: 34px; border-radius: 20px; background: #000;
    z-index: 50;
  }

  /* ---------- Screens / router ---------- */
  .screen {
    position: absolute; inset: 0;
    display: none; flex-direction: column;
    background: var(--bg);
  }
  .screen.active { display: flex; animation: fadeIn .22s ease; }
  @keyframes fadeIn { from { opacity: .35; } to { opacity: 1; } }

  .scroll { flex: 1; overflow-y: auto; scrollbar-width: none; }
  .scroll::-webkit-scrollbar { display: none; }

  /* ---------- Shared ---------- */
  .icon { width: 1em; height: 1em; stroke: currentColor; fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; display: block; }
  .icon.filled { fill: currentColor; stroke: none; }
  .num { direction: ltr; unicode-bidi: isolate; }

  .circle-btn {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--card); color: var(--text);
    display: flex; align-items: center; justify-content: center;
    border: none; cursor: pointer; font-size: 17px; flex: none;
  }

  /* ---------- Home ---------- */
  .home-content { padding: 60px 16px 24px; display: flex; flex-direction: column; gap: 20px; }

  .header-row { display: flex; align-items: center; gap: 12px; }
  .bank-logo {
    width: 52px; height: 52px; border-radius: 16px; object-fit: cover;
    flex: none;
  }
  .greeting .hi { font-size: 13px; color: var(--text-2); }
  .greeting .name { font-size: 19px; font-weight: 700; color: var(--text); margin-top: 2px; }
  .spacer { flex: 1; }

  .bell-wrap { position: relative; }
  .bell-dot {
    position: absolute; top: 5px; right: 5px;
    width: 9px; height: 9px; border-radius: 50%; background: var(--accent);
  }

  .points-pill {
    align-self: flex-start;
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(142,138,216,.38); color: #fff;
    font-size: 13px; font-weight: 700;
    padding: 7px 14px; border-radius: 100px;
    margin-top: -6px;
  }
  .points-pill .icon { font-size: 11px; }

  .balance-card {
    background: var(--card); border-radius: var(--radius);
    padding: 20px; display: flex; flex-direction: column; gap: 14px;
  }
  .balance-card .label { font-size: 14px; color: var(--text-2); }
  .balance-row { display: flex; align-items: baseline; gap: 8px; }
  .balance-row .amount { font-size: 34px; font-weight: 800; color: var(--text); }
  .balance-row .cur { font-size: 16px; font-weight: 600; color: var(--text-2); }
  .card-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-2); }

  .quick-actions { display: flex; gap: 12px; }
  .qa {
    flex: 1; height: 96px; background: var(--card); border-radius: var(--radius);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
    cursor: pointer;
  }
  .qa .qa-icon {
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(13,12,32,.65); color: var(--accent);
    display: flex; align-items: center; justify-content: center; font-size: 20px;
  }
  .qa .qa-label {
    font-size: 10px; font-weight: 500; color: var(--text);
    text-align: center; line-height: 1.35; padding: 0 4px;
  }

  .banner { width: 100%; border-radius: var(--radius); display: block; cursor: pointer; }

  .tx-header { display: flex; align-items: baseline; justify-content: space-between; }
  .tx-header .title { font-size: 16px; font-weight: 700; color: var(--text); }
  .tx-header .sub { font-size: 11px; color: var(--text-2); }

  .tx-row {
    background: var(--card); border-radius: var(--radius);
    padding: 14px; display: flex; flex-direction: column; gap: 10px;
  }
  .tx-main { display: flex; align-items: center; gap: 12px; }
  .tx-icon {
    width: 40px; height: 40px; border-radius: 12px; flex: none;
    background: var(--card-elev); color: var(--accent);
    display: flex; align-items: center; justify-content: center; font-size: 16px;
  }
  .tx-icon.round { border-radius: 50%; width: 44px; height: 44px; border: 1px solid rgba(255,255,255,.12); }
  .tx-info { display: flex; flex-direction: column; gap: 3px; min-width: 0; flex: 1; }
  .tx-info .m { font-size: 14px; font-weight: 700; color: var(--text); }
  .tx-info .s { font-size: 11px; color: var(--text-2); }
  .tx-amt {
    display: flex; align-items: center; gap: 6px;
    direction: ltr; flex: none;
  }
  .tx-amt .chev { color: var(--text-2); font-size: 11px; }
  .tx-amt .a { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; }

  .wadhah-pill {
    align-self: flex-start; /* RTL: leading = right… screenshot shows bottom-left, so use flex-end */
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--copper); color: #fff;
    font-size: 13px; font-weight: 700;
    padding: 5px 14px 5px 8px; border-radius: 100px;
    border: none; cursor: pointer;
  }
  .pill-holder { display: flex; justify-content: flex-end; }
  /* The real logo glyph, tight-cropped — shown at its true aspect, unclipped */
  .wadhah-pill img { height: 20px; width: auto; }

  .cta {
    height: 48px; border-radius: 14px; background: var(--accent);
    color: #fff; font-size: 15px; font-weight: 700;
    border: none; cursor: pointer; width: 100%;
    font-family: inherit;
  }

  .tabbar {
    display: flex; background: var(--card); padding: 10px 4px 22px;
    flex: none;
  }
  .tab {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
    color: var(--text-2); font-size: 10px; cursor: pointer; background: none; border: none;
    font-family: inherit;
  }
  .tab .icon { font-size: 19px; }
  .tab.active { color: var(--accent); }

  /* ---------- History ---------- */
  .nav-head {
    display: flex; align-items: center; gap: 14px;
    padding: 58px 16px 14px;
    flex: none;
  }
  .nav-head .title { font-size: 21px; font-weight: 700; color: var(--text); }
  .history-list { padding: 4px 16px 24px; display: flex; flex-direction: column; gap: 12px; }
  .history-list .tx-info .m { font-size: 15px; }

  /* ---------- Chat ---------- */
  .chat-head {
    display: flex; align-items: center; gap: 10px;
    padding: 58px 16px 12px;
    border-bottom: 1px solid rgba(255,255,255,.07);
    flex: none;
  }
  .chat-head .title { font-size: 17px; font-weight: 700; color: var(--text); }
  .wad-avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--copper);
    display: flex; align-items: center; justify-content: center; flex: none;
  }
  .wad-avatar img { width: 26px; height: 26px; object-fit: contain; }

  .chat-scroll { padding: 16px; display: flex; flex-direction: column; gap: 14px; }

  .msg-user {
    align-self: flex-end; /* RTL flex-end = left… we want RIGHT per screenshot → flex-start */
    background: var(--user-bubble); color: #1C1B3A;
    font-size: 14px; font-weight: 600; line-height: 1.6;
    padding: 12px 14px; border-radius: 18px;
    max-width: 78%;
  }
  .msg-row-user { display: flex; justify-content: flex-start; }
  .msg-row-assist { display: flex; justify-content: flex-end; gap: 8px; align-items: flex-end; }

  .msg-assist {
    background: var(--assist-bubble); color: #2A2A2A;
    font-size: 14px; line-height: 1.75;
    padding: 16px; border-radius: 18px;
    max-width: 88%;
    display: flex; flex-direction: column; gap: 14px;
  }
  .msg-actions { display: flex; gap: 8px; flex-wrap: nowrap; }
  .chat-btn {
    font-size: 12px; font-weight: 700; padding: 10px 13px;
    border-radius: 100px; cursor: pointer; font-family: inherit;
    white-space: nowrap;
  }
  .chat-btn.primary { background: var(--copper); color: #fff; border: none; }
  .chat-btn.secondary { background: #fff; color: #2A2A2A; border: 1.2px solid #C9C2BA; }

  .msg-avatar {
    width: 26px; height: 26px; border-radius: 50%; background: var(--copper);
    display: flex; align-items: center; justify-content: center; flex: none;
  }
  .msg-avatar img { width: 17px; height: 17px; object-fit: contain; }

  .msg-time { font-size: 10px; color: var(--text-2); }

  .typing { display: inline-flex; gap: 4px; padding: 4px 2px; }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%; background: #B7AB9E;
    animation: blink 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%, 70%, 100% { opacity: .25; } 35% { opacity: 1; } }

  .chat-input {
    display: flex; gap: 10px; align-items: center;
    padding: 10px 16px 26px; flex: none; background: var(--bg);
  }
  .chat-input input {
    flex: 1; height: 46px; border-radius: 100px;
    background: var(--card); border: none; outline: none;
    color: var(--text); font-size: 13px; font-family: inherit;
    padding: 0 18px;
  }
  .chat-input input::placeholder { color: var(--text-2); }
  .send-btn {
    width: 46px; height: 46px; border-radius: 50%; flex: none;
    background: var(--accent); color: #fff; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 15px;
  }
  .send-btn .icon { transform: scaleX(-1); }

  /* ---------- Verified identity card (محرك وضّح) ---------- */
  .vc-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
  .vc-badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 800; padding: 5px 11px; border-radius: 100px;
  }
  .vc-badge.ok { background: #DFF3EA; color: #177A55; }
  .vc-badge.pending { background: #F6E4D9; color: #A2542E; }
  .vc-conf { font-size: 11px; font-weight: 800; padding: 5px 10px; border-radius: 100px; }
  .vc-conf.ok { color: #177A55; background: #DFF3EA; }
  .vc-conf.pending { color: #A2542E; background: #F6E4D9; }
  .vc-name { font-size: 16px; font-weight: 800; color: #1E1E1E; }
  .vc-sub { font-size: 11.5px; color: #7A7268; margin-top: 3px; line-height: 1.6; }
  .vc-rows {
    display: flex; flex-direction: column; gap: 7px;
    border-top: 1px solid #E7DFD4; padding-top: 10px;
  }
  .vc-row { display: flex; justify-content: space-between; gap: 10px; font-size: 12px; }
  .vc-row .k { color: #8A8177; flex: none; }
  .vc-row .v { font-weight: 700; color: #2A2A2A; text-align: left; }
  .vc-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #1E9E6A; margin-inline-end: 5px; }
  .vc-explain { font-size: 13px; line-height: 1.8; }
  .vc-how { border-top: 1px dashed #E0D7CA; padding-top: 9px; }
  .vc-how summary { font-size: 11.5px; font-weight: 700; color: #8A8177; cursor: pointer; list-style: none; }
  .vc-how summary::-webkit-details-marker { display: none; }
  .vc-how summary::before { content: "▸ "; }
  .vc-how[open] summary::before { content: "▾ "; }
  .vc-more { font-size: 11.5px; font-weight: 700; color: #A2542E; cursor: pointer; text-decoration: underline; }
  .vc-full { display: none; }
  .vc-full.show { display: block; }
  .vc-how .steps { margin-top: 8px; display: flex; flex-direction: column; gap: 5px; font-size: 11px; color: #6E665C; line-height: 1.7; }
  .vc-how .steps b { color: #2A2A2A; }

  /* ---------- Toast ---------- */
  .toast {
    position: absolute; bottom: 110px; left: 50%; transform: translateX(-50%) translateY(8px);
    background: rgba(22,21,47,.94); color: #fff;
    font-size: 12.5px; font-weight: 600;
    padding: 10px 18px; border-radius: 100px;
    border: 1px solid rgba(255,255,255,.12);
    opacity: 0; pointer-events: none; transition: all .25s ease;
    z-index: 60; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>

</script>

<div id="scaler">
  <div class="phone">
    <div class="island"></div>

    <!-- Idle lock screen: the simulator waits for the user -->
    <div id="lockscreen" onclick="unlockPhone()" role="button" aria-label="ابدأ التجربة">
      <svg class="lock-mark" viewBox="0 0 104 122" aria-hidden="true">
        <g fill="none" stroke="currentColor" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M28 15l8 11"/><path d="M52 7v14"/><path d="M76 15l-8 11"/>
          <path d="M40 89 C 26 81 18 67.5 21 53.5 C 24 37.5 37 27 52 27 C 67 27 80 37.5 83 53.5 C 85.5 65.5 80 76.5 70.5 83 C 65 86.5 62.5 90.5 62.5 96.5"/>
          <path d="M39 108h26"/><path d="M44 120h16"/>
        </g>
      </svg>
      <span class="lock-hint">اضغط لتجربة وضّح</span>
    </div>

    <!-- ============ Screen 1: Home ============ -->
    <section class="screen active" id="screen-home">
      <div class="scroll">
        <div class="home-content">

          <div class="header-row">
            <img class="bank-logo" src="assets/banklogo.png?v=2" alt="بنك الإنماء">
            <div class="greeting">
              <div class="hi">مساء الخير</div>
              <div class="name">مرحبًا أنس 👋</div>
            </div>
            <div class="spacer"></div>
            <div class="bell-wrap">
              <button class="circle-btn" onclick="toast()"><svg class="icon"><use href="#i-bell"/></svg></button>
              <div class="bell-dot"></div>
            </div>
          </div>

          <div class="points-pill">
            <svg class="icon filled"><use href="#i-sparkle"/></svg>
            <span><span class="num">1,330</span> نقطة</span>
          </div>

          <div class="balance-card">
            <div class="label">الرصيد الحالي</div>
            <div class="balance-row">
              <span class="amount num">18,240.75</span>
              <span class="cur">SAR</span>
            </div>
            <div class="card-meta">
              <span class="num">•••• 4821</span>
              <span>صالحة حتى <span class="num">08/28</span></span>
            </div>
          </div>

          <div class="quick-actions">
            <div class="qa" onclick="toast()"><div class="qa-icon"><svg class="icon"><use href="#i-receipt"/></svg></div><div class="qa-label">دفع الفواتير</div></div>
            <div class="qa" onclick="toast()"><div class="qa-icon"><svg class="icon"><use href="#i-transfer"/></svg></div><div class="qa-label">الحوالات السريعة</div></div>
            <div class="qa" onclick="toast()"><div class="qa-icon"><svg class="icon"><use href="#i-phone"/></svg></div><div class="qa-label">شحن الجوال</div></div>
            <div class="qa" onclick="toast()"><div class="qa-icon"><svg class="icon"><use href="#i-car"/></svg></div><div class="qa-label">المخالفات المرورية</div></div>
          </div>

          <div style="display:flex;flex-direction:column;gap:12px">
            <img class="banner" src="assets/banner-fantasy.png" alt="الإنماء فانتزي" onclick="toast()">
            <img class="banner" src="assets/banner-airalo.png" alt="airalo" onclick="toast()">
          </div>

          <div style="display:flex;flex-direction:column;gap:12px">
            <div class="tx-header">
              <span class="title">آخر العمليات</span>
              <span class="sub">آخر <span class="num">3</span> عمليات</span>
            </div>
            <div id="home-tx"></div>
            <button class="cta" onclick="navigate('screen-history')">عرض الكل</button>
          </div>

        </div>
      </div>

      <div class="tabbar">
        <button class="tab active"><svg class="icon"><use href="#i-house"/></svg><span>الرئيسية</span></button>
        <button class="tab" onclick="toast()"><svg class="icon"><use href="#i-transfer"/></svg><span>التحويل</span></button>
        <button class="tab" onclick="toast()"><svg class="icon"><use href="#i-cardpay"/></svg><span>المدفوعات</span></button>
        <button class="tab" onclick="toast()"><svg class="icon"><use href="#i-bag"/></svg><span>المتجر</span></button>
        <button class="tab" onclick="toast()"><svg class="icon"><use href="#i-grid"/></svg><span>الخدمات</span></button>
      </div>
    </section>

    <!-- ============ Screen 2: History ============ -->
    <section class="screen" id="screen-history">
      <div class="nav-head">
        <button class="circle-btn" onclick="goBack()"><svg class="icon"><use href="#i-back"/></svg></button>
        <span class="title">سجل العمليات</span>
      </div>
      <div class="scroll">
        <div class="history-list" id="history-list"></div>
      </div>
    </section>

    <!-- ============ Screens 3/4: Wadhah Chat ============ -->
    <section class="screen" id="screen-chat">
      <div class="chat-head">
        <button class="circle-btn" onclick="goBack()"><svg class="icon"><use href="#i-back"/></svg></button>
        <div class="wad-avatar"><img src="assets/wad.png" alt="وضح"></div>
        <span class="title">وضّح - مساعدك البنكي</span>
      </div>
      <div class="scroll" id="chat-scroll-wrap">
        <div class="chat-scroll" id="chat-thread"></div>
      </div>
      <div class="chat-input">
        <input id="chat-field" type="text" placeholder="اسأل عن عملية أو رسوم أو اشتراك..."
               onkeydown="if(event.key==='Enter')sendMessage()">
        <button class="send-btn" onclick="sendMessage()"><svg class="icon"><use href="#i-plane"/></svg></button>
      </div>
    </section>

    <div class="toast" id="toast">نسخة تجريبية للعرض ✨</div>
  </div>
</div>

<script src="wathq-data.js"></script>
<script src="engine.js"></script>
<script>
/* ---------------- Data (mirrors Models.swift) ----------------
   العمليات كما تصل من الشبكة (الوصف الخام). التفسير لم يعد مكتوبًا
   يدويًا: محرك وضّح يطابق الوصف مع الجدول المرجعي (wathq-data.js). */
const HOME_TX = [
  { m: "APPLE COM BILL",      s: "اليوم · 9:15 ص", a: "-3.69 SAR",  icon: "i-phone" },
  { m: "ADDRESS CAFE TRD CO", s: "اليوم · 7:40 ص", a: "-28.00 SAR", icon: "i-cup"   },
  { m: "AL NAHDI MEDICAL CO", s: "أمس · 6:05 م",   a: "-45.30 SAR", icon: "i-bag"   },
];

const HISTORY_TX = [
  { m: "APPLE COM BILL",               s: "خدمات وتطبيقات إلكترونية · اليوم · 9:15 ص", a: "-3.69 SAR",   icon: "i-phone"  },
  { m: "ADDRESS CAFE TRD CO",          s: "مقهى · اليوم · 7:40 ص",                     a: "-28.00 SAR",  icon: "i-cup"    },
  { m: "THAMAR AL-TANMIYA TRADING CO", s: "نقاط بيع - مدى · أمس · 8:30 م",             a: "-84.00 SAR",  icon: "i-basket" },
  { m: "AL NAHDI MEDICAL CO",          s: "صيدلية · أمس · 6:05 م",                     a: "-45.30 SAR",  icon: "i-bag"    },
  { m: "HUNGERSTATION LLC",            s: "توصيل طعام · قبل يومين",                    a: "-50.84 SAR",  icon: "i-fork"   },
  { m: "ALDREES PETROLEUM CO",         s: "محطة وقود · قبل ٣ أيام",                    a: "-120.00 SAR", icon: "i-fuel"   },
];

/* سؤال العميل: نص السيناريو المحفوظ إن وجد، وإلا سؤال عام */
function userQuestion(merchant, rawName) {
  if (merchant && merchant.userMessage) return merchant.userMessage;
  return "وش هذي العملية (" + rawName + ")؟ ما أعرف هالاسم!";
}

/* ---------------- Router ---------------- */
const stack = ["screen-home"];
function show(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.toggle("active", s.id === id));
}
function navigate(id) { stack.push(id); show(id); }
function goBack() {
  if (stack.length > 1) stack.pop();
  show(stack[stack.length - 1]);
}

/* ---------------- Rendering ---------------- */
function txRowHTML(t, opts) {
  const roundIcon = opts.round ? " round" : "";
  const chev = opts.chevron ? '<svg class="icon chev"><use href="#i-chevron-l"/></svg>' : "";
  const pill = opts.pill
    ? '<div class="pill-holder"><button class="wadhah-pill" onclick="openChat(' + opts.idx + ')">' +
      '<span>وضح</span><img src="assets/wad-glyph.png" alt=""></button></div>'
    : "";
  return (
    '<div class="tx-row">' +
      '<div class="tx-main">' +
        '<div class="tx-icon' + roundIcon + '"><svg class="icon"><use href="#' + t.icon + '"/></svg></div>' +
        '<div class="tx-info"><span class="m">' + t.m + '</span><span class="s">' + t.s + "</span></div>" +
        '<div class="tx-amt">' + chev + '<span class="a">' + t.a + "</span></div>" +
      "</div>" + pill +
    "</div>"
  );
}

document.getElementById("home-tx").innerHTML =
  '<div style="display:flex;flex-direction:column;gap:12px">' +
  HOME_TX.map(t => txRowHTML(t, { round: false, chevron: false, pill: false })).join("") +
  "</div>";

document.getElementById("history-list").innerHTML =
  HISTORY_TX.map((t, i) => txRowHTML(t, { round: true, chevron: true, pill: true, idx: i })).join("");

/* ---------------- Chat ---------------- */
const thread = document.getElementById("chat-thread");

function bubbleUser(text) {
  return '<div class="msg-row-user"><div class="msg-user">' + text + "</div></div>";
}
function bubbleAssistant(text, actions) {
  const btns = actions && actions.length
    ? '<div class="msg-actions">' +
      '<button class="chat-btn primary" onclick="toast()">' + actions[0] + "</button>" +
      '<button class="chat-btn secondary" onclick="toast()">' + actions[1] + "</button>" +
      "</div>"
    : "";
  return (
    '<div class="msg-row-assist">' +
      '<div class="msg-assist"><div>' + text.replace(/\n/g, "<br>") + "</div>" + btns + "</div>" +
      '<div class="msg-avatar"><img src="assets/wad.png" alt=""></div>' +
    "</div>"
  );
}

/* ---------------- بطاقة الهوية الموثقة (مخرجات المحرك) ---------------- */
function typingRow(id) {
  return '<div class="msg-row-assist" id="' + id + '">' +
    '<div class="msg-assist"><div class="typing"><span></span><span></span><span></span></div></div>' +
    '<div class="msg-avatar"><img src="assets/wad.png" alt=""></div>' +
  "</div>";
}

function identityCard(res, tx) {
  const m = res.merchant;
  const verified = res.verified;
  const badge = verified
    ? '<span class="vc-badge ok">✓ هوية موثقة من السجل التجاري</span>'
    : '<span class="vc-badge pending">◌ قيد التوثيق الحكومي</span>';
  const conf = '<span class="vc-conf ' + (verified ? "ok" : "pending") + '">الثقة <span class="num">' + res.confidence + '%</span></span>';

  let rows = "";
  if (verified) {
    rows +=
      '<div class="vc-row"><span class="k">السجل التجاري</span><span class="v"><span class="num">' + m.crNumber + '</span></span></div>' +
      '<div class="vc-row"><span class="k">الرقم الوطني الموحد</span><span class="v"><span class="num">' + m.crNationalNumber + '</span></span></div>' +
      '<div class="vc-row"><span class="k">حالة السجل</span><span class="v"><span class="vc-dot"></span>' + m.status + '</span></div>';
  } else {
    rows +=
      '<div class="vc-row"><span class="k">التوثيق</span><span class="v">يُستكمل من السحبة القادمة لواثق</span></div>';
  }
  rows +=
    '<div class="vc-row"><span class="k">النشاط</span><span class="v">' + m.activities[0].name + '</span></div>' +
    (m.city ? '<div class="vc-row"><span class="k">المدينة</span><span class="v">' + m.city + '</span></div>' : "") +
    (tx ? '<div class="vc-row"><span class="k">العملية</span><span class="v"><span class="num">' + tx.a + '</span> · ' + tx.s + '</span></div>' : "");

  const legalLine = m.legalName && m.legalName !== m.displayName
    ? 'الاسم الرسمي: <bdi>' + m.legalName + '</bdi>' + (m.displayBranch ? ' · ' + m.displayBranch : "")
    : (m.displayBranch || "");

  const hasMore = m.explanation && m.explanationShort && m.explanation !== m.explanationShort;
  const explainBlock =
    '<div class="vc-explain">' + (m.explanationShort || m.explanation) +
      (hasMore
        ? ' <span class="vc-more" onclick="toggleExplain(this)">عرض التفاصيل</span>' +
          '<span class="vc-full"> ' + m.explanation + '</span>'
        : "") +
    "</div>";

  const how =
    '<details class="vc-how"><summary>كيف طابقنا هذا الاسم؟</summary><div class="steps">' +
      '<div>المدخل الخام: <b><bdi class="num">' + (tx ? tx.m : res.normalizedInput) + '</bdi></b></div>' +
      '<div>بعد التطبيع: <b>' + res.normalizedInput + '</b></div>' +
      '<div>المرادف المطابق: <b><bdi>' + res.matchedAlias + '</bdi></b></div>' +
      '<div>درجة التشابه: <b><span class="num">' + res.confidence + '%</span></b></div>' +
      '<div>المصدر: <b>' + (verified ? "واثق — السجل التجاري (وزارة التجارة)" : "الجدول الأولي — بانتظار التوثيق") + '</b></div>' +
    "</div></details>";

  const actions =
    '<div class="msg-actions">' +
      '<button class="chat-btn primary" onclick="ackClear()">كل شيء واضح ✓</button>' +
      '<button class="chat-btn secondary" onclick="fileDispute(\'' + m.id + '\')">تقديم اعتراض</button>' +
    "</div>";

  return (
    '<div class="msg-row-assist">' +
      '<div class="msg-assist">' +
        '<div class="vc-top">' + badge + conf + "</div>" +
        '<div><div class="vc-name">' + m.displayName + '</div><div class="vc-sub">' + legalLine + "</div></div>" +
        '<div class="vc-rows">' + rows + "</div>" +
        explainBlock +
        how + actions +
      "</div>" +
      '<div class="msg-avatar"><img src="assets/wad.png" alt=""></div>' +
    "</div>"
  );
}

function toggleExplain(el) {
  const full = el.nextElementSibling;
  const open = full.classList.toggle("show");
  el.textContent = open ? "إخفاء التفاصيل" : "عرض التفاصيل";
}

function noMatchBubble() {
  return bubbleAssistant(
    "ما قدرت أوثّق هذا الاسم من الجدول التجريبي الحالي (" + WATHQ_MERCHANTS.length + " تجار).\n" +
    "في النسخة الكاملة، أي اسم غير معروف يُضاف تلقائيًا لقائمة التوثيق القادمة من واثق.\n" +
    "إذا كانت عندك عملية محددة، افتحها من سجل العمليات واضغط زر (وضح).",
    null
  );
}

function ackClear() {
  thread.insertAdjacentHTML("beforeend",
    bubbleAssistant("تم إغلاق الاستفسار ✓ بدون مكالمة وبدون نزاع.", null) +
    '<div class="msg-time">وضح · الآن</div>');
  scrollChat();
}

function fileDispute(merchantId) {
  const m = WATHQ_MERCHANTS.find(x => x.id === merchantId);
  const idLine = m && m.crNumber
    ? "هوية التاجر: <bdi>" + m.legalName + "</bdi> (س.ت <bdi class='num'>" + m.crNumber + "</bdi>) — موثقة من السجل التجاري"
    : "هوية التاجر: <bdi>" + (m ? m.legalName : "غير محددة") + "</bdi> — قيد التوثيق";
  thread.insertAdjacentHTML("beforeend",
    bubbleAssistant(
      "جهزت ملف الاعتراض وأرفقت الأدلة تلقائيًا:\n" +
      "• " + idLine + "\n" +
      "• تفاصيل العملية والطابع الزمني من سجل حسابك\n" +
      "• نتيجة المطابقة ودرجة الثقة\n" +
      "الملف جاهز للإرسال لفريق النزاعات.", null) +
    '<div class="msg-time">وضح · الآن</div>');
  scrollChat();
}

let openingReplyTimer;
function openChat(idx) {
  try { window.parent !== window && window.parent.postMessage({ type: 'wadhah-analyzing' }, '*'); } catch (e) {}
  const tx = HISTORY_TX[idx];
  const res = WadhahEngine.match(tx.m);
  clearTimeout(openingReplyTimer);
  // وضّح "يحلل" العملية أولًا: السؤال + مؤشر الكتابة، ثم البطاقة تصل بعد لحظة.
  thread.innerHTML = bubbleUser(userQuestion(res && res.merchant, tx.m)) + typingRow("opening-typing");
  navigate("screen-chat");
  scrollChat();

  openingReplyTimer = setTimeout(() => {
    const typing = document.getElementById("opening-typing");
    if (!typing) return;
    typing.remove();
    thread.insertAdjacentHTML("beforeend",
      (res ? identityCard(res, tx) : noMatchBubble()) +
      '<div class="msg-time">وضح · الآن</div>');
    scrollChat();
  }, 1400);
}

function scrollChat() {
  const w = document.getElementById("chat-scroll-wrap");
  w.scrollTop = w.scrollHeight;
}

function sendMessage() {
  const field = document.getElementById("chat-field");
  const text = field.value.trim();
  if (!text) return;
  field.value = "";
  thread.insertAdjacentHTML("beforeend", bubbleUser(text));
  scrollChat();

  const typingId = "typing-" + Date.now();
  thread.insertAdjacentHTML("beforeend",
    '<div class="msg-row-assist" id="' + typingId + '">' +
      '<div class="msg-assist"><div class="typing"><span></span><span></span><span></span></div></div>' +
      '<div class="msg-avatar"><img src="assets/wad.png" alt=""></div>' +
    "</div>");
  scrollChat();

  setTimeout(() => {
    document.getElementById(typingId).remove();
    const res = WadhahEngine.matchFromText(text);
    thread.insertAdjacentHTML("beforeend",
      (res ? identityCard(res, null) : noMatchBubble()) +
      '<div class="msg-time">وضح · الآن</div>');
    scrollChat();
  }, 1100);
}

/* ---------------- Toast + scaling ---------------- */
let toastTimer;
function unlockPhone() {
  const ls = document.getElementById('lockscreen');
  if (!ls || ls.classList.contains('off')) return;
  ls.classList.add('off');
  try { window.parent !== window && window.parent.postMessage({ type: 'wadhah-unlocked' }, '*'); } catch (e) {}
  setTimeout(() => ls.remove(), 1000);
}
function toast() {
  const t = document.getElementById("toast");
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 1600);
}

function fit() {
  const s = Math.min(1, (window.innerHeight - 28) / 880, (window.innerWidth - 28) / 421);
  document.getElementById("scaler").style.transform = "scale(" + s + ")";
}
window.addEventListener("resize", fit);
fit();
</script>
</body>
</html>
